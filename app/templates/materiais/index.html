{% extends "base.html" %}

{% block title %}Gestão de Materiais{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <!-- Header e Tabela unificados em Card -->
    <div class="card shadow mb-4 card-custom">
        <div class="card-header py-3 d-flex justify-content-between align-items-center bg-white border-bottom-0">
            <h4 class="m-0 font-weight-bold text-primary fw-bold">Catálogo de Materiais</h4>
            <button class="btn btn-custom-primary btn-sm" onclick="openModal()">
                <i class="bi bi-plus-lg me-2"></i>Novo Material
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="tabelaMateriais"
                    class="table table-bordered table-striped table-hover table-custom w-100 align-middle"
                    cellspacing="0">
                    <thead>
                        <tr>
                            <th class="text-center" width="5%">ID</th>
                            <th width="30%">Nome</th>
                            <th width="20%">Categoria</th>
                            <th width="10%">Unidade</th>
                            <th width="20%">Descrição</th>
                            <th class="text-end" width="15%">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Cadastro/Edição -->
<div class="modal fade" id="modalMaterial" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content card-custom border-0">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Novo Material</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-4">
                <form id="formMaterial">
                    <input type="hidden" id="materialId">

                    <div class="row g-3">
                        <!-- Nome -->
                        <div class="col-12">
                            <label for="nome" class="form-label fw-bold text-muted small text-uppercase">Nome do
                                Material *</label>
                            <input type="text" class="form-control form-control-custom" id="nome" required
                                placeholder="Ex: Cimento CP II">
                        </div>

                        <!-- Categoria -->
                        <div class="col-md-6">
                            <label for="categoria"
                                class="form-label fw-bold text-muted small text-uppercase">Categoria</label>
                            <select class="form-select form-control-custom" id="categoria">
                                <option value="">Selecione...</option>
                                <option value="Alvenaria">Alvenaria</option>
                                <option value="Elétrica">Elétrica</option>
                                <option value="Hidráulica">Hidráulica</option>
                                <option value="Pintura">Pintura</option>
                                <option value="Acabamento">Acabamento</option>
                                <option value="Ferramentas">Ferramentas</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>

                        <!-- Unidade -->
                        <div class="col-md-6">
                            <label for="unidade" class="form-label fw-bold text-muted small text-uppercase">Unidade
                                *</label>
                            <select class="form-select form-control-custom" id="unidade" required>
                                <option value="un">un (Unidade)</option>
                                <option value="kg">kg (Quilo)</option>
                                <option value="m">m (Metro)</option>
                                <option value="m2">m² (Metro Quadrado)</option>
                                <option value="m3">m³ (Metro Cúbico)</option>
                                <option value="l">l (Litro)</option>
                                <option value="cx">cx (Caixa)</option>
                                <option value="sc">sc (Saco)</option>
                                <option value="br">br (Barra)</option>
                            </select>
                        </div>

                        <!-- Descrição -->
                        <div class="col-12">
                            <label for="descricao" class="form-label fw-bold text-muted small text-uppercase">Descrição
                                / Detalhes</label>
                            <textarea class="form-control form-control-custom" id="descricao" rows="3"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 pt-0 pb-4 pe-4">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-custom-primary rounded-pill px-4" onclick="salvarMaterial()">
                    <i class="bi bi-check-lg me-2"></i>Salvar
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" />
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<!-- Page Script -->
<script src="/static/js/pages/materiais.js"></script>

<style>
    .table-bordered td,
    .table-bordered th {
        border: 1px solid #dee2e6 !important;
    }
</style>
{% endblock %}
