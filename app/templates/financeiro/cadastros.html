{% extends "base_financeiro.html" %}

{% block financeiro_content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Entidades Cadastradas</h1>
    <button class="btn btn-primary" onclick="abrirModalCadastro()">
        <i class="bi bi-plus-lg"></i> Novo Cadastro
    </button>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover" id="tabela-entidades">
                <thead>
                    <tr>
                        <th>Nome / Razão Social</th>
                        <th>Tipo</th>
                        <th>Função</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populado via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Cadastro/Edição -->
<div class="modal fade" id="modalEntidade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Nova Entidade</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="form-cadastro" class="needs-validation" novalidate>
                    <input type="hidden" id="entidade_id" name="id">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nome_razao_social" class="form-label">Nome / Razão Social</label>
                            <input type="text" class="form-control" id="nome_razao_social" name="nome_razao_social"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label for="tipo_pessoa" class="form-label">Tipo Pessoa</label>
                            <select class="form-select" id="tipo_pessoa" name="tipo_pessoa">
                                <option value="PF">Pessoa Física</option>
                                <option value="PJ">Pessoa Jurídica</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="cpf_cnpj" class="form-label">CPF / CNPJ</label>
                            <input type="text" class="form-control" id="cpf_cnpj" name="cpf_cnpj">
                        </div>
                        <div class="col-md-6">
                            <label for="funcao" class="form-label">Função</label>
                            <input type="text" class="form-control" id="funcao" name="funcao">
                        </div>
                        <div class="col-md-6">
                            <label for="municipio_atuacao" class="form-label">Município de Atuação</label>
                            <input type="text" class="form-control" id="municipio_atuacao" name="municipio_atuacao">
                        </div>

                        <h5 class="mt-4">Endereço</h5>
                        <div class="col-md-10">
                            <label for="endereco_rua" class="form-label">Rua/Logradouro</label>
                            <input type="text" class="form-control" id="endereco_rua" name="endereco_rua">
                        </div>
                        <div class="col-md-2">
                            <label for="endereco_numero" class="form-label">Número</label>
                            <input type="text" class="form-control" id="endereco_numero" name="endereco_numero">
                        </div>
                        <div class="col-md-5">
                            <label for="endereco_bairro" class="form-label">Bairro</label>
                            <input type="text" class="form-control" id="endereco_bairro" name="endereco_bairro">
                        </div>
                        <div class="col-md-5">
                            <label for="endereco_cidade" class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="endereco_cidade" name="endereco_cidade">
                        </div>
                        <div class="col-md-2">
                            <label for="endereco_cep" class="form-label">CEP</label>
                            <input type="text" class="form-control" id="endereco_cep" name="endereco_cep">
                        </div>

                        <h5 class="mt-4">Contato</h5>
                        <div class="col-md-6">
                            <label for="contato_telefone" class="form-label">Telefone / Celular</label>
                            <input type="text" class="form-control" id="contato_telefone" name="contato_telefone">
                        </div>
                        <div class="col-md-6">
                            <label for="contato_email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="contato_email" name="contato_email">
                        </div>

                        <h5 class="mt-4">Dados Bancários</h5>
                        <div class="col-md-4">
                            <label for="dados_bancarios_banco" class="form-label">Banco</label>
                            <input type="text" class="form-control" id="dados_bancarios_banco"
                                name="dados_bancarios_banco">
                        </div>
                        <div class="col-md-4">
                            <label for="dados_bancarios_agencia" class="form-label">Agência</label>
                            <input type="text" class="form-control" id="dados_bancarios_agencia"
                                name="dados_bancarios_agencia">
                        </div>
                        <div class="col-md-4">
                            <label for="dados_bancarios_conta" class="form-label">Conta</label>
                            <input type="text" class="form-control" id="dados_bancarios_conta"
                                name="dados_bancarios_conta">
                        </div>

                        <div class="col-12 mt-4 text-end">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Salvar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    let modalEntidade;

    document.addEventListener('DOMContentLoaded', function () {
        modalEntidade = new bootstrap.Modal(document.getElementById('modalEntidade'));
        carregarEntidades();

        document.getElementById('form-cadastro').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            const id = document.getElementById('entidade_id').value;

            const url = id ? `/financeiro/entidades/${id}` : '/financeiro/entidades';
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    ui.feedbackSucesso('Operação realizada com sucesso!');
                    modalEntidade.hide();
                    carregarEntidades();
                } else {
                    ui.feedbackErro('Erro ao realizar operação.');
                }
            } catch (error) {
                console.error('Erro:', error);
                ui.feedbackErro('Erro de conexão.');
            }
        });
    });

    function abrirModalCadastro() {
        document.getElementById('form-cadastro').reset();
        document.getElementById('entidade_id').value = '';
        document.getElementById('modalTitle').textContent = 'Nova Entidade';
        modalEntidade.show();
    }

    async function abrirModalEdicao(id) {
        try {
            const response = await fetch(`/financeiro/entidades/${id}`);
            const entidade = await response.json();

            document.getElementById('entidade_id').value = entidade.id;
            document.getElementById('nome_razao_social').value = entidade.nome_razao_social || '';
            document.getElementById('tipo_pessoa').value = entidade.tipo_pessoa || 'PF';
            document.getElementById('cpf_cnpj').value = entidade.cpf_cnpj || '';
            document.getElementById('funcao').value = entidade.funcao || '';
            document.getElementById('municipio_atuacao').value = entidade.municipio_atuacao || '';

            document.getElementById('endereco_rua').value = entidade.endereco_rua || '';
            document.getElementById('endereco_numero').value = entidade.endereco_numero || '';
            document.getElementById('endereco_bairro').value = entidade.endereco_bairro || '';
            document.getElementById('endereco_cidade').value = entidade.endereco_cidade || '';
            document.getElementById('endereco_cep').value = entidade.endereco_cep || '';

            document.getElementById('contato_telefone').value = entidade.contato_telefone || '';
            document.getElementById('contato_email').value = entidade.contato_email || '';

            document.getElementById('dados_bancarios_banco').value = entidade.dados_bancarios_banco || '';
            document.getElementById('dados_bancarios_agencia').value = entidade.dados_bancarios_agencia || '';
            document.getElementById('dados_bancarios_conta').value = entidade.dados_bancarios_conta || '';

            document.getElementById('modalTitle').textContent = 'Editar Entidade';
            modalEntidade.show();
        } catch (error) {
            console.error('Erro ao carregar entidade:', error);
            ui.feedbackErro('Erro ao carregar dados da entidade.');
        }
    }

    async function excluirEntidade(id) {
        ui.confirmarExclusao(
            `/financeiro/entidades/${id}`,
            `Entidade`,
            () => {
                ui.feedbackSucesso('Entidade excluída!');
                carregarEntidades();
            }
        );
    }

    async function carregarEntidades() {
        try {
            const response = await fetch('/financeiro/entidades');
            const entidades = await response.json();

            const tbody = document.querySelector('#tabela-entidades tbody');
            tbody.innerHTML = '';

            entidades.forEach(entidade => {
                const row = `
                    <tr>
                        <td>${entidade.nome_razao_social}</td>
                        <td>${entidade.tipo_pessoa}</td>
                        <td>${entidade.funcao || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="abrirModalEdicao(${entidade.id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="excluirEntidade(${entidade.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        } catch (error) {
            console.error('Erro ao carregar entidades:', error);
        }
    }
</script>
{% endblock %}
