{% extends "base.html" %}
{% block title %}Gráficos{% endblock %}
{% block styles %}
<style>
    /* O padding-top do body já vem do base.html */
    .grafico-container {
        position: relative;
        height: 55vh;
        /* Altura ajustável conforme necessário */
        min-height: 350px;
    }
</style>
{% endblock %}
{% block content %}
<main class="container mb-5">
    <!-- Header Padronizado -->
    <div class="d-flex align-items-center mb-4 border-bottom pb-3">
        <h1 class="h2 page-header-title mb-0">
            <i class="bi bi-bar-chart-line-fill me-2 text-primary"></i>Gráficos
        </h1>
    </div>

    <div class="row g-4 justify-content-center">
        <!-- Gráfico de Barras -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body p-4">
                    <h5 class="text-secondary fw-bold mb-4">
                        <i class="bi bi-geo-alt me-2"></i>Beneficiários por Município
                    </h5>
                    <div class="grafico-container">
                        <canvas id="graficoMunicipios"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gráfico de Rosca -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body p-4">
                    <h5 class="text-secondary fw-bold mb-4">
                        <i class="bi bi-pie-chart me-2"></i>Status Geral
                    </h5>
                    <div class="grafico-container" style="height: 400px;"> <!-- Altura fixa para alinhar melhor -->
                        <canvas id="graficoStatusGeral"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="/static/js/pages/graficos.js?v=2.0"></script>
{% endblock %}
