{% extends "base.html" %}

{% block title %}Validação de Dados{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="display-6 mb-4">Validação de Dados do Formulário</h1>
    <div class="row g-4">
        <div class="col-md-7">
            <h5 class="text-muted mb-3">Imagem do Documento Original</h5>
            <div class="border rounded p-2" style="height: 80vh; background-color: #f8f9fa;">
                <iframe id="imagem-documento" src="" style="width: 100%; height: 100%; border: none;"></iframe>
            </div>
        </div>
        <div class="col-md-5">
            <h5 class="text-muted mb-3">Dados Extraídos (Corrija se necessário)</h5>
            <div class="card shadow-sm">
                <div class="card-body" style="max-height: 80vh; overflow-y: auto;">
                    <form id="form-validacao">
                        <input type="hidden" id="item_id" name="id_fila">
                        <div class="mb-3">
                            <label for="nome_completo" class="form-label fw-bold">1. Nome Completo</label>
                            <input type="text" class="form-control" id="nome_completo" name="nome_completo">
                        </div>
                        <div class="mb-3">
                            <label for="sexo" class="form-label fw-bold">2. Sexo</label>
                            <input type="text" class="form-control" id="sexo" name="sexo">
                        </div>
                        <div class="mb-3">
                            <label for="data_nascimento" class="form-label fw-bold">3. Data de Nascimento</label>
                            <input type="text" class="form-control" id="data_nascimento" name="data_nascimento">
                        </div>
                        <div class="mb-3">
                            <label for="cpf" class="form-label fw-bold">4. CPF</label>
                            <input type="text" class="form-control" id="cpf" name="cpf">
                        </div>
                        <div class="mb-3">
                            <label for="escolaridade" class="form-label fw-bold">5. Escolaridade</label>
                            <input type="text" class="form-control" id="escolaridade" name="escolaridade">
                        </div>
                        <div class="mb-3">
                            <label for="comunidade" class="form-label fw-bold">6. Comunidade</label>
                            <input type="text" class="form-control" id="comunidade" name="comunidade">
                        </div>
                        <div class="mb-3">
                            <label for="ref_localizacao" class="form-label fw-bold">7. Ref. Localização</label>
                            <input type="text" class="form-control" id="ref_localizacao" name="ref_localizacao">
                        </div>
                        <div class="mb-3">
                            <label for="municipio" class="form-label fw-bold">8. Município</label>
                            <input type="text" class="form-control" id="municipio" name="municipio">
                        </div>
                        <div class="mb-3">
                            <label for="estado_uf" class="form-label fw-bold">9. Estado (UF)</label>
                            <input type="text" class="form-control" id="estado_uf" name="estado_uf">
                        </div>
                        <div class="mb-3">
                            <label for="nis" class="form-label fw-bold">NIS (Página 2)</label>
                            <input type="text" class="form-control" id="nis" name="nis">
                        </div>
                        <hr>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-check-circle-fill"></i> Confirmar e Salvar Beneficiário
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/validacao.js?v=99"></script>
{% endblock %}
